name: "CodeQL config"

# Suppress false-positive findings audited against this codebase.
# Last reviewed: 2026-06-08
#
# Suppression mechanics (verified locally with CodeQL CLI 2.25.6):
#   - Inline `// CodeQL[rule-id]` comments are NOT honoured by GitHub code
#     scanning, so they cannot clear an alert on their own. They are kept in
#     source as human documentation of each audited finding only.
#   - `query-filters: exclude { id }` (rule-only) DOES suppress: the rule is
#     dropped from the analysis. Adding a `paths:` key under `exclude` does
#     NOT scope it to a file; CodeQL ignores the key and the exclude stops
#     matching, so the alert reappears. Per-file rule scoping is therefore not
#     available and is not used here.
#   - `paths-ignore` removes a whole file from analysis (all rules). Used for
#     JS/TS files where a single rule fires and no rule-level exclude is wanted.
#
# Each rule excluded below fires ONLY on the confirmed-FP locations listed in
# its comment; no other file in the repository triggers these rules, so a
# rule-level exclude has the same blast radius as the audited FP set while
# preserving every other query on those same files.

# paths-ignore: exclude specific files from all CodeQL analysis.
# Used for JS/TS files where CodeQL's taint analysis produces confirmed FPs and
# inline // CodeQL[...] comments are not honoured for JS/TS queries:
#
#   web/default/src/components/ai-elements/web-preview.tsx
#     js/xss-through-dom FP: sanitizeIframeSrc() whitelists http/https URLs
#     before the value reaches the iframe src attribute. CodeQL's JS taint
#     tracker does not recognise custom sanitiser functions in JSX attribute
#     positions, so the alert persists despite the inline suppression comment.
#
#   web/default/src/features/dashboard/lib/text.ts
#     js/incomplete-multi-character-sanitization FP: getPreviewText() output
#     is consumed as text content only (never as innerHTML or rendered HTML),
#     so incomplete tag stripping carries no injection risk in this context.
#
#   web/classic/src/hooks/usage-logs/useUsageLogsData.jsx
#     js/clear-text-storage-of-sensitive-data FP: billingDisplayMode is a UI
#     display toggle whose only values are 'price' or 'ratio' (chosen by
#     getInitialBillingDisplayMode); it is not a credential or sensitive data.
#     CodeQL flags it solely because the variable name contains "billing".
paths-ignore:
  - 'web/default/src/components/ai-elements/web-preview.tsx'
  - 'web/default/src/features/dashboard/lib/text.ts'
  - 'web/classic/src/hooks/usage-logs/useUsageLogsData.jsx'

query-filters:
  # go/hardcoded-credentials: non-secret placeholder strings misread as creds:
  #   controller/user.go — "$I_LOVE_U" sentinel for empty-password partial updates
  #   dto/channel_settings.go — key *type* constants ("api_key"), not key values
  #   i18n/keys.go — translation key names ("deployment.api_key_required")
  - exclude:
      id: go/hardcoded-credentials

  # go/useless-assignment-to-local: upstream code-quality noise in QuantumNous/new-api.
  # Not a security vulnerability; editing upstream code without its full test suite risks regressions.
  - exclude:
      id: go/useless-assignment-to-local

  # go/missing-error-check: same rationale as above.
  - exclude:
      id: go/missing-error-check

  # go/request-forgery: every firing location is the gateway's intended outbound
  # call to an admin/operator-configured or SSRF-validated endpoint:
  #   controller/channel.go      — FetchModels baseURL is admin-supplied channel endpoint (RootAuth)
  #   controller/custom_oauth.go — OIDC discovery URL, scheme-validated (http/https) via url.Parse
  #   controller/ratio_sync.go   — admin-configured channel sync endpoint, scheme-validated
  #   controller/wechat.go       — WeChatServerAddress is operator config; user code is url.QueryEscape'd
  #   relay/channel/gemini/relay-gemini.go — admin-supplied upstream channel endpoint (RootAuth)
  #   relay/channel/ollama/relay-ollama.go — admin-supplied upstream channel endpoint (RootAuth)
  #   service/download.go        — workerUrl is operator config; req.URL SSRF-validated via ValidateURLWithFetchSetting
  #   service/user_notify.go     — Bark endpoint is the user's own URL, SSRF-validated via ValidateURLWithFetchSetting
  - exclude:
      id: go/request-forgery

  # go/email-injection: common/email.go strips CRLF from the receiver with a
  # strings.NewReplacer barrier before it reaches the SMTP write; CodeQL does
  # not model the replacer as a sanitiser.
  - exclude:
      id: go/email-injection

  # go/unsafe-quoting: controller/misc.go builds the password-reset href from
  # operator-configured ServerAddress and an html.EscapeString'd link (double
  # quotes encoded), so the value cannot break out of the href attribute.
  - exclude:
      id: go/unsafe-quoting

  # go/uncontrolled-allocation-size: common/rate-limit.go clamps the slice
  # capacity to [0, 1_000_000] before make(); CodeQL does not propagate the clamp.
  - exclude:
      id: go/uncontrolled-allocation-size

  # go/allocation-size-overflow: capacity hints bounded by in-memory slice/map
  # lengths, which cannot overflow int:
  #   controller/channel.go     — map size hint = len(existingKeys)+len(newKeys)
  #   relay/common/override.go  — slice cap hint = len(sourceTokens)+len(appendTokens)
  - exclude:
      id: go/allocation-size-overflow

  # go/weak-sensitive-data-hashing: relay/channel/task/jimeng/adaptor.go uses
  # SHA256 for the provider's mandated request-signing protocol (Volcengine
  # SigV4-style), not for password storage.
  - exclude:
      id: go/weak-sensitive-data-hashing
