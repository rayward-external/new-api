name: "CodeQL config"

# Suppress false-positive findings audited against this codebase.
# Last reviewed: 2026-05-28
query-filters:
  # 1. go/hardcoded-credentials:
  #    - controller/user.go: "$I_LOVE_U" placeholder used when password field is empty
  #      during partial Update payloads; the surrounding code re-fetches the DB hash before save.
  #    - dto/channel_settings.go: Vertex/AWS key *type* constants ("api_key"), not real credentials.
  #    - i18n/keys.go: translation key names like "deployment.api_key_required".
  - exclude:
      id: go/hardcoded-credentials
      paths:
        - controller/user.go
        - dto/channel_settings.go
        - i18n/keys.go

  # 2. go/request-forgery: This is an AI API gateway — making HTTP requests to
  #    admin-configured upstream provider URLs is the core purpose of the application.
  #    Suppression scope is intentionally narrow:
  #    - relay/: provider-specific proxy code; URLs come from admin-configured channels
  #    - service/download.go: admin-controlled worker/download endpoints
  #    - service/user_notify.go: admin-configured notification service URLs
  #    - controller/channel.go: admin-configured channel test endpoints
  #    - controller/wechat.go: WeChat API; fixed third-party endpoint
  #
  #    NOT suppressed (URL validated or fixed at the sink):
  #    - controller/custom_oauth.go: scheme-validated inline (http/https only guard at line ~165)
  #    - controller/ratio_sync.go: scheme-validated inline (http/https guard added at fullURL construction)
  - exclude:
      id: go/request-forgery
      paths:
        - relay/
        - service/download.go
        - service/user_notify.go
        - controller/channel.go
        - controller/wechat.go

  # 3. go/allocation-size-overflow: capacity hints where two len() values are summed.
  #    The summands are bounded by admin-configured API key lists and token sets;
  #    a wrap-around would require petabytes of memory which is physically impossible.
  - exclude:
      id: go/allocation-size-overflow
      paths:
        - controller/channel.go
        - relay/common/override.go

  # 4. go/weak-sensitive-data-hashing: The jimeng channel uses SHA256 for API request
  #    signing (HMAC-style), following the provider's documented API authentication spec.
  #    This is NOT password hashing — it is the required algorithm for API signature verification.
  - exclude:
      id: go/weak-sensitive-data-hashing
      paths:
        - relay/channel/task/jimeng/

  # 5. go/useless-assignment-to-local: upstream code-quality findings in QuantumNous/new-api.
  #    Not security vulnerabilities; fixing them without the full upstream test suite risks regressions.
  - exclude:
      id: go/useless-assignment-to-local

  # 6. go/missing-error-check: upstream code-quality findings. Same rationale as above.
  - exclude:
      id: go/missing-error-check
