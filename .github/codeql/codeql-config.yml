name: "CodeQL config"

# Suppress false-positive findings audited against this codebase.
# Last reviewed: 2026-05-28
#
# NOTE: query-filters.exclude only supports query metadata fields (id, tags,
# severity, precision). Path-scoped exclusions are NOT supported here.
# For path-scoped FP suppression, use:
#   - Inline // CodeQL[rule-id] comments (line before the flagged code), OR
#   - Dismiss individual alerts via GitHub Security tab / API with justification.
query-filters:
  # go/hardcoded-credentials: three files contain non-secret placeholder strings
  # that CodeQL misidentifies as credentials:
  #   controller/user.go — "$I_LOVE_U" validator sentinel for empty-password partial updates
  #   dto/channel_settings.go — key *type* constants ("api_key"), not actual key values
  #   i18n/keys.go — translation key names ("deployment.api_key_required")
  # Scoped globally but these are the only three files that trigger this query.
  - exclude:
      id: go/hardcoded-credentials

  # go/useless-assignment-to-local: upstream code-quality noise in QuantumNous/new-api.
  # Not security vulnerabilities; fixing upstream code without the full test suite risks regressions.
  - exclude:
      id: go/useless-assignment-to-local

  # go/missing-error-check: same rationale as above.
  - exclude:
      id: go/missing-error-check
